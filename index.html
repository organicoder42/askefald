<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASKEFALD</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #14171a;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9a9c9b;
        font-family: ui-monospace, monospace;
        font-size: 13px;
        letter-spacing: 0.35em;
        pointer-events: none;
        transition: opacity 1.2s ease;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">ASKEFALD</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
